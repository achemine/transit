<!doctype html>
<html lang="en">
  <head>
    <style>
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box; /* width/height includes padding & border */
      }

      html,
      body {
        height: 100%; /* fill the whole browser window */
        overflow: hidden; /* the map handles its own scrolling */
      }

      body {
        font-family: "Roboto", Arial, sans-serif;
        font-size: 14px;
        color: var(--text-primary);
        background: var(--bg-secondary);
        display: flex;
        flex-direction: column; /* stack: top-bar → main → bottom-tabs */
      }

      /* Remove default button look — we style every button ourselves */
      button {
        border: none;
        background: none;
        cursor: pointer;
        font-family: inherit;
        font-size: inherit;
      }

      /* Remove default list styling */
      ul {
        list-style: none;
      }

      /* Remove the blue focus outline on click, but keep it for keyboard navigation */
      button:focus-visible,
      input:focus-visible {
        outline: 2px solid var(--blue);
        outline-offset: 2px;
      }
      button:focus:not(:focus-visible),
      input:focus:not(:focus-visible) {
        outline: none;
      }
      #top-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 14px;
        height: var(--topbar-height);
        background: var(--bg-primary);
        box-shadow: var(--shadow-sm);
        position: relative; /* needed so the search dropdown sits below it */
        z-index: 1000; /* float above everything else */
        flex-shrink: 0; /* never let the top bar shrink */
      }

      /* ── Hamburger menu button ── */
      #menu-btn {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        color: var(--text-secondary);
        flex-shrink: 0;
        transition: background var(--speed);
      }
      #menu-btn:hover {
        background: var(--bg-tertiary);
      }

      /* ── Search box (pill shape) ── */
      #search-box {
        flex: 0.5; /* grow to fill all available width */
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: var(--bg-tertiary);
        border-radius: var(--radius-pill);
        padding: 0 14px;
        height: 44px;
        border: 2px solid transparent;
        transition:
          border-color var(--speed),
          background var(--speed),
          box-shadow var(--speed);
        position: relative;
      }
      /* When the user clicks the search box, highlight it */
      #search-box:focus-within {
        border-color: var(--blue);
        background: var(--bg-primary);
        box-shadow: var(--shadow-sm);
      }
      #search-box > i {
        color: var(--text-hint);
        font-size: 16px;
        flex-shrink: 0;
      }
      #search-input {
        flex: 1;
        border: none;
        background: transparent;
        font-size: 15px;
        color: var(--text-primary);
        min-width: 0; /* prevent overflow on small screens */
      }
      #search-input::placeholder {
        color: var(--text-hint);
      }

      /* Clear (×) button — only visible when user has typed something */
      #clear-btn {
        color: var(--text-hint);
        font-size: 15px;
        padding: 4px;
        display: none; /* hidden by default, shown via JS */
        border-radius: 50%;
        transition: background var(--speed);
      }
      #clear-btn:hover {
        background: var(--border);
      }

      /* Search arrow button */
      #search-btn {
        color: var(--blue);
        font-size: 17px;
        padding: 4px 6px;
        border-radius: 50%;
        transition: background var(--speed);
      }
      #search-btn:hover {
        background: var(--blue-light);
      }

      /* ── Right-side action buttons ── */
      #top-actions {
        display: flex;
        gap: 6px;
        flex-shrink: 0;
      }
      #top-actions button {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        color: var(--text-secondary);
        border: 1.5px solid var(--border);
        background: var(--bg-primary);
        transition:
          background var(--speed),
          border-color var(--speed);
      }
      #top-actions button:hover {
        background: var(--bg-tertiary);
        border-color: var(--blue);
        color: var(--blue);
      }

      /* ── Search results dropdown ── */
      #search-results {
        position: absolute;
        top: calc(100% + 4px); /* just below the search box */
        left: 60px; /* align with search box left edge */
        right: 110px; /* align with search box right edge */
        background: var(--bg-primary);
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-md);
        z-index: 2000;
        overflow: hidden;
        display: none;
        max-height: 320px;
        overflow-y: auto;
      }
      .result-item {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 12px 16px;
        cursor: pointer;
        border-bottom: 1px solid var(--bg-tertiary);
        transition: background var(--speed);
      }
      .result-item:hover {
        background: var(--bg-secondary);
      }
      .result-item:last-child {
        border-bottom: none;
      }
      .result-item i {
        color: var(--blue);
        font-size: 16px;
        margin-top: 2px;
        flex-shrink: 0;
      }
      .result-item-text {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .result-item-name {
        font-size: 14px;
        font-weight: 500;
        color: var(--text-primary);
      }
      .result-item-detail {
        font-size: 12px;
        color: var(--text-secondary);
      }
    </style>
  </head>
  <body>
    <center>
      <header id="top-bar">
        <!-- ☰ Hamburger — opens the sidebar menu -->
        <button id="menu-btn" title="Open menu" aria-label="Open menu">
          <i class="fa-solid fa-bars"></i>
        </button>

        <!-- Search box in the middle -->
        <div id="search-box">
          <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
          <input
            type="text"
            id="search-input"
            placeholder="Search places, addresses…"
            autocomplete="on"
            aria-label="Search"
          />
          <!-- Clear button (×) — appears when user types something -->
          <button id="clear-btn" title="Clear search" aria-label="Clear">
            <i class="fa-solid fa-xmark"></i>
          </button>
          <!-- Arrow to submit the search -->
          <button id="search-btn" title="Search" aria-label="Search">
            <i class="fa-solid fa-arrow-right"></i>
          </button>
        </div>

        <!-- Right-side icon buttons -->
        <div id="top-actions">
          <button
            id="locate-btn"
            title="Find my location"
            aria-label="Find my location"
          >
            <i class="fa-solid fa-location-crosshairs"></i>
          </button>
          <button
            id="dark-mode-btn"
            title="Toggle dark mode"
            aria-label="Toggle dark mode"
          >
            <i class="fa-solid fa-moon"></i>
          </button>
        </div>

        <!-- Dropdown list that appears while searching -->
        <div
          id="search-results"
          role="listbox"
          aria-label="Search results"
        ></div>
      </header>
    </center>
    <script>
      const map = L.map("map", {
        center: [36.737, 3.0865],
        zoom: 13,
        zoomControl: false,
        attributionControl: true,
      });
    </script>
  </body>
</html>
